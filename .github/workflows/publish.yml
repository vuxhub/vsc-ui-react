name: Weekly NPM Release

on:
  schedule:
    - cron: '0 10 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: weekly-npm-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Plan release
        id: plan
        run: npm run release:plan

      - name: Summarize release plan
        env:
          BASE_REF: ${{ steps.plan.outputs.base_ref }}
          BUMP: ${{ steps.plan.outputs.bump }}
          COMPONENT_COUNT: ${{ steps.plan.outputs.component_count }}
          MODE: ${{ steps.plan.outputs.mode }}
          SHOULD_RELEASE: ${{ steps.plan.outputs.should_release }}
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          {
            echo "## Weekly NPM release"
            echo "- Release: $SHOULD_RELEASE"
            echo "- Mode: $MODE"
            echo "- Base: ${BASE_REF:-none}"
            echo "- Changed components: $COMPONENT_COUNT"
            echo "- Bump: $BUMP"
            echo "- Version: $VERSION"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check out pending release
        if: steps.plan.outputs.mode == 'resume'
        env:
          RELEASE_REF: ${{ steps.plan.outputs.release_ref }}
        run: git checkout --detach "$RELEASE_REF"

      - name: Bump package version
        if: steps.plan.outputs.mode == 'new'
        env:
          VERSION: ${{ steps.plan.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        if: steps.plan.outputs.should_release == 'true'
        run: npm ci

      - name: Validate package
        if: steps.plan.outputs.should_release == 'true'
        run: npm run prepublishOnly

      - name: Verify release token
        if: steps.plan.outputs.mode == 'new'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "RELEASE_TOKEN is not configured"
            exit 1
          fi

          gh api "repos/$GITHUB_REPOSITORY" --silent

      - name: Create and merge release pull request
        id: release_pr
        if: steps.plan.outputs.mode == 'new'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          SOURCE_SHA: ${{ steps.plan.outputs.source_sha }}
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "ci: release v$VERSION"

          RELEASE_BRANCH="automation/npm-release-v$VERSION"
          RELEASE_COMMIT=$(git rev-parse HEAD)

          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$SOURCE_SHA" ]; then
            echo "main changed while the release was running"
            exit 1
          fi

          if git ls-remote --exit-code --heads \
            origin "refs/heads/$RELEASE_BRANCH" >/dev/null; then
            git fetch origin "$RELEASE_BRANCH"

            if ! git diff --quiet "$RELEASE_COMMIT" FETCH_HEAD --; then
              echo "$RELEASE_BRANCH contains different changes"
              exit 1
            fi

            RELEASE_COMMIT=$(git rev-parse FETCH_HEAD)
          else
            git push origin "HEAD:refs/heads/$RELEASE_BRANCH"
          fi

          PR_URL=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$RELEASE_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "ci: release v$VERSION" \
              --body "Automated weekly npm release.")
          fi

          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$SOURCE_SHA" ]; then
            gh pr close "$PR_URL" \
              --repo "$GITHUB_REPOSITORY" \
              --delete-branch
            echo "main changed before the release PR could merge"
            exit 1
          fi

          gh pr merge "$PR_URL" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch \
            --match-head-commit "$RELEASE_COMMIT"

          MERGED_SHA=$(gh pr view "$PR_URL" \
            --repo "$GITHUB_REPOSITORY" \
            --json mergeCommit \
            --jq '.mergeCommit.oid')

          if [ -z "$MERGED_SHA" ] || [ "$MERGED_SHA" = "null" ]; then
            echo "The release PR did not produce a merge commit"
            exit 1
          fi

          git fetch origin main
          git checkout --detach "$MERGED_SHA"
          echo "release_ref=$MERGED_SHA" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: |
          steps.plan.outputs.should_release == 'true' &&
          steps.plan.outputs.mode != 'resume'
        env:
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "refs/tags/v$VERSION"

      - name: Publish package
        if: steps.plan.outputs.should_release == 'true'
        run: npm publish --access public --provenance --ignore-scripts
